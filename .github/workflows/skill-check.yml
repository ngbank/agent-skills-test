name: SkillSpector PR Scan

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"
      - "**/SKILL.md"
      - "**/AGENTS.md"
      - "**/mcp*.json"
  
  push:
    branches:
      - main

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  skillspector:
    name: SkillSpector PR Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install SkillSpector
        run: |
          python -m pip install --upgrade pip
          pip install git+https://github.com/NVIDIA/SkillSpector.git

      - name: Run SkillSpector SARIF scan
        run: |
          skillspector scan . \
            --format sarif \
            --output skillspector.sarif \
            --no-llm

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
          category: skillspector
